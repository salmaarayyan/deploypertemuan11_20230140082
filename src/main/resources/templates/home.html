<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
<!-- Navbar -->
<nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex-shrink-0 flex items-center">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-600 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg text-white font-bold text-xl">
                    P12
                </div>
                <span class="ml-3 font-bold text-xl text-gray-900">Dashboard</span>
            </div>
            <div class="flex items-center">
                <span class="mr-4 text-sm text-gray-500">Halo, <span th:text="${profile.nama}" class="font-semibold text-gray-800">User</span></span>
                <a th:href="@{/logout}" class="inline-flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 shadow-sm transition">
                    Logout
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-6 py-8 sm:p-10">
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Welcome to your Dashboard!</h1>
            <p class="text-gray-500 mb-8">Berikut adalah informasi profil yang tersimpan di sistem.</p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Profile Card -->
                <div class="bg-gradient-to-br from-indigo-50 to-blue-50 rounded-xl p-6 border border-indigo-100 shadow-inner">
                    <h3 class="text-lg font-semibold text-indigo-900 mb-4 border-b border-indigo-200 pb-2">Informasi Akun</h3>

                    <div class="space-y-4">
                        <div>
                            <p class="text-sm font-medium text-indigo-400">Username</p>
                            <p class="text-lg font-semibold text-indigo-900 flex items-center mt-1">
                                <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                <span th:text="${user.username}">Username</span>
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Personal Data Card -->
                <div class="bg-gradient-to-br from-purple-50 to-pink-50 rounded-xl p-6 border border-purple-100 shadow-inner">
                    <h3 class="text-lg font-semibold text-purple-900 mb-4 border-b border-purple-200 pb-2">Data Personal</h3>

                    <div class="space-y-4">
                        <div>
                            <p class="text-sm font-medium text-purple-400">Nama Lengkap</p>
                            <p class="text-lg font-semibold text-purple-900 flex items-center mt-1">
                                <svg class="w-5 h-5 mr-2 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"></path></svg>
                                <span th:text="${profile.nama}">Nama</span>
                            </p>
                        </div>

                        <div>
                            <p class="text-sm font-medium text-purple-400">Alamat</p>
                            <p class="text-lg font-semibold text-purple-900 flex items-center mt-1">
                                <svg class="w-5 h-5 mr-2 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                <span th:text="${profile.alamat}">Alamat Lengkap</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
