<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-teal-400 via-emerald-500 to-green-600 min-h-screen flex items-center justify-center p-4">
<div class="bg-white/95 backdrop-blur-xl p-8 rounded-2xl shadow-2xl w-full max-w-md my-8">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-gray-800">Create Account</h2>
        <p class="text-gray-500 mt-2">Daftar sekarang! Silakan isi data di bawah ini.</p>
    </div>

    <form th:action="@{/register}" method="post" th:object="${request}" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" th:field="*{username}" placeholder="Pilih username"
                   class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition duration-200" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" th:field="*{password}" placeholder="Buat password"
                   class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition duration-200" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
            <input type="text" th:field="*{nama}" placeholder="Masukkan nama lengkap"
                   class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition duration-200" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Alamat</label>
            <input type="text" th:field="*{alamat}" placeholder="Masukkan alamat lengkap"
                   class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition duration-200" required>
        </div>

        <button type="submit" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-bold py-3 px-4 rounded-lg hover:opacity-90 transform transition hover:-translate-y-0.5 shadow-lg mt-4">
            Register
        </button>
    </form>

    <div class="mt-6 text-center text-sm text-gray-600">
        <p>Sudah punya akun?
            <a th:href="@{/login}" class="font-bold text-emerald-600 hover:text-emerald-800 transition">Login di sini</a>
        </p>
    </div>
</div>
</body>
</html>
